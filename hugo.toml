baseURL = "https://grimchronicle.com"
title = "Grim Chronicle"
theme = "PaperMod"
languageCode = "en-us"
paginate = 10

[params]
  gtmContainerId = "GTM-5TFJK5WD"
  description = "History's darkest chapters — crimes, disasters and cover-ups explained."
  author = "Grim Chronicle"
  defaultTheme = "dark"
  ShowReadingTime = true
  ShowShareButtons = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowToc = true

[params.homeInfoParams]
  Title = "Welcome to Grim Chronicle"
  Content = "True crime, historical disasters and dark world events — told clearly and without compromise."

[[params.socialIcons]]
  name = "youtube"
  url = "https://youtube.com/@GrimChronicleShow"

[params.assets]
  favicon = "images/favicon.png"
  favicon16x16 = "images/favicon.png"
  favicon32x32 = "images/favicon.png"
  apple_touch_icon = "images/favicon.png"
  safari_pinned_tab = "images/favicon.png"

[params.label]
  iconDark = "images/logo-dark.png"
  iconLight = "images/logo-light.png"
  iconHeight = 30

[menu]
  [[menu.main]]
    name = "Home"
    url = "/"
    weight = 1
  [[menu.main]]
    name = "True Crime"
    url = "/categories/true-crime/"
    weight = 2
  [[menu.main]]
    name = "Dark History"
    url = "/categories/dark-history/"
    weight = 3
  [[menu.main]]
    name = "Mysteries"
    url = "/categories/mysteries/"
    weight = 4
  [[menu.main]]
    name = "About"
    url = "/about/"
    weight = 5
[outputFormats.RSS]
  mediaType = "application/rss+xml"
  baseName = "feed"
[[menu.footer]]
  name = "Privacy Policy"
  url = "/privacy-policy/"
  weight = 1

[[menu.footer]]
  name = "Terms of Service"
  url = "/terms-of-service/"
  weight = 2

[[menu.footer]]
  name = "Contact"
  url = "mailto:contact@grimchronicle.com"
  weight = 3